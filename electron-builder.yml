appId: com.singularity.app
productName: Singularity
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - '!out/**/*.map'
# Unpack ffmpeg-static binary from the asar archive so the main process can spawn it
asarUnpack:
  - node_modules/ffmpeg-static/**
# Bundle MPV for Windows — downloaded by scripts/download-mpv.js before build
extraResources:
  - from: resources/win/mpv.exe
    to: mpv.exe
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  artifactName: Singularity.exe
  # Skip code signing — no certificate needed for personal distribution
  signingHashAlgorithms: []
  sign: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Singularity
  artifactName: Singularity Setup.exe
  include: build/installer.nsh
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: Singularity.png
  category: public.app-category.entertainment
  darkModeSupport: true
  # identity: null = unsigned build; add Apple Developer cert later for notarization
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  title: Singularity
  artifactName: Singularity.dmg
  window:
    width: 540
    height: 380
