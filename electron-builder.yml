appId: com.singularity.app
productName: Singularity
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - '!out/**/*.map'
# Replace stripped Electron FFmpeg with full-codec NW.js prebuilt (enables AC3/EAC3/DTS audio)
# Never let electron-builder publish — GitHub Actions handles artifact upload/release
publish: never
afterPack: scripts/afterPack.js
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: build/icon.ico
  # Skip code signing — no certificate needed for personal distribution
  signingHashAlgorithms: []
  sign: null
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Singularity
mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  icon: Singularity.png
  category: public.app-category.entertainment
  darkModeSupport: true
  # identity: null = unsigned build; add Apple Developer cert later for notarization
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
dmg:
  title: Singularity
  window:
    width: 540
    height: 380
