name: Build & Release

# Triggers:
#   push --tags v*   → builds both platforms AND creates a GitHub Release
#   workflow_dispatch → manual trigger from GitHub UI (builds only, no release)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*.exe
          retention-days: 7

  # ── macOS arm64 build (runs on Apple Silicon GitHub runner) ───────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS (arm64)
        run: npm run build:mac
        env:
          # Disable code signing for unsigned distribution
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 7

  # ── GitHub Release (only on version tag pushes) ───────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-dist
          path: release-files

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dist
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Singularity ${{ github.ref_name }}
          body: |
            ## Singularity ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `Singularity Setup *.exe` | Installer (recommended) |
            | Windows | `Singularity *.exe` | Portable, no install needed |
            | macOS (M1/M2/M3/M4) | `Singularity-*-arm64.dmg` | Apple Silicon DMG |

            > **macOS first launch:** Right-click the app → Open → Open Anyway to bypass Gatekeeper (unsigned build).
          files: release-files/*
          draft: false
          prerelease: false
